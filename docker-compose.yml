services:
  rabbitmq:
    image: rabbitmq:management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ballcom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./db/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'

  order:
    build:
      context: .
      dockerfile: apps/order/Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      RABBITMQ_URL: amqp://rabbitmq
      DB_HOST: postgres
    depends_on:
      rabbitmq:
        condition: service_healthy

  shipping:
    build:
      context: .
      dockerfile: apps/shipping/Dockerfile
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      RABBITMQ_URL: amqp://rabbitmq
      DB_HOST: postgres
    depends_on:
      - rabbitmq
      - postgres

  productcatalog:
    build:
      context: .
      dockerfile: apps/productcatalog/Dockerfile
    ports:
      - '3003:3003'
    environment:
      PORT: 3003
      RABBITMQ_URL: amqp://rabbitmq
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: productdb
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started

  payment:
    build:
      context: .
      dockerfile: apps/payment/Dockerfile
    ports:
      - '3004:3004'
    environment:
      PORT: 3004
      RABBITMQ_URL: amqp://rabbitmq
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      PAYMENT_EVENT_DB_NAME: payment_events_db
      PAYMENT_READ_DB_NAME: payment_read_db
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
        
  warehouse:
    build:
      context: .
      dockerfile: apps/warehouse/Dockerfile
    ports:
      - '3007:3007'
    environment:
      PORT: 3007
      RABBITMQ_URL: amqp://rabbitmq
      DB_HOST: postgres
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
        
  customer-support:
    build:
      context: .
      dockerfile: apps/customer-support/Dockerfile
    ports:
      - '3008:3008'
    environment:
      PORT: 3008
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_started